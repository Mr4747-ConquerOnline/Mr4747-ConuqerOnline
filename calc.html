```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>حاسبة Mr.4747</title>

  <style>
    :root{
      --gold:#f7d36a;
      --text:#e8eef5;
      --muted:#b6c2cf;
      --border:rgba(255,255,255,0.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0; padding:18px;
      font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans',sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(247,211,106,0.18), transparent 60%),
        linear-gradient(rgba(5,7,10,0.92), rgba(5,7,10,0.94)),
        url("https://i.postimg.cc/D0j5wyc9/Gemini-Generated-Image-b4c9wvb24c9wvb4c9.png");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .wrap{ max-width:720px; margin:0 auto; }

    .top{
      text-align:center; margin-bottom:12px;
      font-weight:900; font-size:20px;
      background:linear-gradient(90deg,#f7d36a,#d9a441);
      -webkit-background-clip:text;
      color:transparent;
    }

    .box{
      border:1px solid rgba(217,164,65,0.22);
      background:linear-gradient(180deg, rgba(15,22,32,0.96), rgba(11,15,20,0.98));
      border-radius:18px;
      padding:16px;
      box-shadow:0 22px 60px rgba(0,0,0,0.55);
      margin:12px 0;
    }

    .box h3{
      margin:0 0 12px;
      color:var(--gold);
      text-align:center;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media(max-width:560px){
      .grid{ grid-template-columns:1fr; }
    }

    .row{ text-align:right; }

    label{
      display:block;
      margin:0 0 6px;
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }

    input, select{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:16px;
      outline:none;
      background:#fff;
      color:#111;
    }

    .note{
      margin-top:10px;
      text-align:center;
      color:#9fb0c5;
      font-size:13px;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(247,211,106,.12);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:900;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="top">حاسبة Mr.4747 السريعة</div>

    <!-- اختيار السعر -->
    <div class="box">
      <h3>اختار نوع العملية</h3>
      <select id="rateType">
        <option value="2.7">شراء (2700)</option>
        <option value="2.55">بيع (2550)</option>
      </select>
    </div>

    <!-- حاسبة الكاش -->
    <div class="box">
      <h3>( حاسبة الكاش ) جنيه ↔ مليون</h3>

      <div class="grid">
        <div class="row">
          <label>الجنيه</label>
          <input type="number" id="cashEGP" placeholder="اكتب الفلوس">
        </div>

        <div class="row">
          <label>المليون</label>
          <input type="number" id="cashMIL" placeholder="اكتب كام مليون">
        </div>
      </div>

      <div class="note">الحساب حسب السعر المختار</div>

      <div class="actions">
        <button id="clearCash">مسح</button>
      </div>
    </div>

    <!-- حاسبة الرصيد -->
    <div class="box">
      <h3>حاسبة الرصيد → مليون</h3>

      <div class="grid">
        <div class="row">
          <label>الرصيد</label>
          <input type="number" id="balInput" placeholder="اكتب الرصيد">
        </div>

        <div class="row">
          <label>الناتج</label>
          <input type="number" id="balMIL" readonly>
        </div>
      </div>

      <div class="note">المعادلة: (الرصيد ÷ 7) × 3.3</div>

      <div class="actions">
        <button id="clearBal">مسح</button>
      </div>
    </div>

  </div>

  <script>
    let RATE = 2.7;

    const rateType = document.getElementById("rateType");
    const cashEGP = document.getElementById("cashEGP");
    const cashMIL = document.getElementById("cashMIL");
    const balInput = document.getElementById("balInput");
    const balMIL = document.getElementById("balMIL");

    const floor1 = (n) => Math.floor(n * 10) / 10;

    rateType.addEventListener("change", () => {
      RATE = parseFloat(rateType.value);
      cashEGP.value = "";
      cashMIL.value = "";
    });

    let lock = false;

    cashEGP.addEventListener("input", () => {
      if(lock) return;
      lock = true;
      const v = parseFloat(cashEGP.value);
      cashMIL.value = cashEGP.value ? floor1(v / RATE) : "";
      lock = false;
    });

    cashMIL.addEventListener("input", () => {
      if(lock) return;
      lock = true;
      const v = parseFloat(cashMIL.value);
      cashEGP.value = cashMIL.value ? floor1(v * RATE) : "";
      lock = false;
    });

    document.getElementById("clearCash").onclick = () => {
      cashEGP.value = "";
      cashMIL.value = "";
    };

    balInput.addEventListener("input", () => {
      const b = parseFloat(balInput.value);
      balMIL.value = balInput.value ? floor1((b / 7) * 3.3) : "";
    });

    document.getElementById("clearBal").onclick = () => {
      balInput.value = "";
      balMIL.value = "";
    };
  </script>

</body>
</html>
